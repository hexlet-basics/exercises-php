---

name: Funciones con número variable de parámetros
theory: |
  Algunas funciones tienen una particularidad: aceptan un número variable de argumentos. Esto no está relacionado con los valores por defecto, como en el caso de `round()`. Se trata de que la cantidad de datos pasados no está limitada a un número fijo.

  Veamos la función `max()`. Encuentra el mayor valor entre los datos pasados.

  ```php
  <?php

  print_r(max(1, 10, 3)); // => 10
  print_r(max(1, -3, 2, 3, 2)); // => 3
  ```

  Abramos la [documentación](https://www.php.net/manual/es/function.max.php) y veamos la firma de `max()`:

  ```php
  max(mixed $value, mixed ...$values): mixed
  ```

  Esto significa:

  - la función requiere al menos un valor (`$value`);
  - después se pueden pasar tantos valores adicionales como se quiera (`...$values`); un número variable de argumentos se indica con los puntos suspensivos `...`;
  - la función devolverá el mayor de los pasados.

  El tipo `mixed` en la firma significa «cualquier tipo»: la función sabe comparar no solo números, sino también otros valores.

  Si entre los argumentos hay varios valores máximos iguales, se devuelve el primero de ellos.

  ```php
  <?php

  print_r(max(5, 5, 2)); // => 5
  ```

  De manera análoga funciona la función `min()`, solo que busca el menor valor:

  ```php
  <?php

  print_r(min(1, 10, 3)); // => 1
  print_r(min(1, -3, 2, 3, 2)); // => -3
  ```
instructions: |
  Durante una semana se registraron las siguientes temperaturas del aire: 3, 10, 22, -3, 0 grados. Encuentra el valor mínimo con la ayuda de la función `min()` y muéstralo en pantalla.
