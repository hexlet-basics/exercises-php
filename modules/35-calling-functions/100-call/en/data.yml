---
name: Functions and how they're called
tips: []
definitions:
  - name: A function
    description: >-
      an operation capable of accepting data and returning a result; a function
      is called like this: `foo()`.
  - name: An argument
    description: >-
      the information a function receives when it is called. For example,
      `foo(42)` passes the argument `42` to the function `foo()`
