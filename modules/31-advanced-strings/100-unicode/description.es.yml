  * Los primeros 128 caracteres eran idรฉnticos a ASCII.
  * Los otros 128 caracteres se llenaban con el alfabeto local.

  Como resultado, estos conjuntos de caracteres tenรญan 256 caracteres, lo que equivale a 2 a la 8va potencia.

  Estos conjuntos de caracteres eran de un solo byte, lo que significa que se necesitaba un byte para almacenar un solo carรกcter. Pero de repente surgiรณ un problema: al intentar abrir un archivo en un editor con una codificaciรณn diferente, aparecรญan caracteres ilegibles, conocidos como [ยซgarabatosยป](https://es.wikipedia.org/wiki/Garabatos):

  > รรจรฐรฎรชร รฟ รฝรซรฅรชรฒรฐรจรดรจรชร รถรจรฟ รพรฆรญรปรต รฃรณรกรฅรฐรญรจรฉ รคร รฑรฒ รฌรฎรนรญรปรฉ รฒรฎรซรทรฎรช รฏรฎรครบยธรฌรณ รฑรฅรซรผรฑรชรฎรฃรฎ รตรฎรงรฟรฉรฑรฒรขร 

  Estos caracteres aparecen porque el mismo cรณdigo en diferentes codificaciones corresponde a caracteres completamente diferentes, excepto los primeros 128. Por lo tanto, el texto que utiliza letras en inglรฉs siempre se lee correctamente, pero en otros casos, depende de la suerte. La situaciรณn se complicaba aรบn mรกs porque incluso dentro de un solo alfabeto se creaban mรบltiples codificaciones diferentes, como Windows-1252, KOI8-R, CP 866, ISO 8859-5.

  En ese momento, en los lenguajes de programaciรณn, todas las funciones para trabajar con cadenas de texto se creaban asumiendo que un carรกcter era igual a un byte. Al menos, esta propiedad era comรบn a todas las codificaciones.

  Las diferentes codificaciones se convirtieron en la causa de problemas constantes en la interacciรณn entre personas y programas. Esta problemรกtica se agravรณ especialmente con el desarrollo de Internet. Esta situaciรณn no podรญa continuar indefinidamente, y finalmente se creรณ el estรกndar **Unicode**.

  Actualmente, Unicode contiene mรกs de 100,000 caracteres y abarca todos los idiomas existentes, incluso los muertos. El estรกndar Unicode no es una codificaciรณn y no dice nada sobre cรณmo se deben almacenar los caracteres en la memoria, solo establece la relaciรณn entre un carรกcter y un nรบmero.

  La forma especรญfica de codificar Unicode se determina mediante las codificaciones correspondientes, entre las que se encuentran UTF-8, UTF-16 y algunas otras. En estas codificaciones, un solo byte ya no es suficiente para almacenar un carรกcter, se necesitan mรกs bytes. UTF-8 se comporta de manera mรกs inteligente: utiliza un byte para los caracteres del alfabeto inglรฉs y algunos otros, y dos bytes para otros alfabetos.

