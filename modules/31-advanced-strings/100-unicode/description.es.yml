name: Unicode
theory: |
  Los datos de un programa se almacenan en la memoria de la computadora como una secuencia de ceros y unos. En este nivel, no hay diferencia entre cadenas de texto, nรบmeros o valores booleanos. Todo se ve igual en la memoria. La diferencia aparece solo en la interpretaciรณn.

  El programa sabe que dentro de una variable se almacena una cadena de texto, por lo que toma los ceros y unos y los pasa a travรฉs de una tabla de cรณdigos. En esta tabla se indica a quรฉ nรบmero corresponde cada letra. Como resultado, el programador ve una cadena de texto. En esta lecciรณn discutiremos cรณmo funcionan estas tablas de cรณdigos.

  Al principio, solo existรญa el [ASCII](https://es.wikipedia.org/wiki/ASCII) - un conjunto de caracteres basado en el alfabeto inglรฉs.

  En este conjunto de caracteres, cada sรญmbolo se representa con 7 bits, lo que da un total de 128 caracteres:

  * 95 caracteres imprimibles, incluyendo letras mayรบsculas y minรบsculas, nรบmeros y signos de puntuaciรณn.
