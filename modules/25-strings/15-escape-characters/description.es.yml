---

name: Secuencias de escape
theory: |
  Supongamos que queremos mostrar el texto de abajo en dos líneas:

  ```text
  - Are you hungry?
  - Aaaarrrgh!
  ```

  Si simplemente le pasamos este texto a `print_r()`, PHP imprimirá todo en una sola línea. Técnicamente, podríamos escribir dos `print_r()` seguidos, pero imaginemos que queremos hacerlo con uno solo:

  ```php
  <?php

  print_r("- Are you hungry?- Aaaarrrgh!");
  // => - Are you hungry?- Aaaarrrgh!
  ```

  Para que cada una empiece en una nueva línea, hay que añadir un salto de línea, es decir, "presionar Enter". En programación esto se implementa añadiendo caracteres especiales, en este caso `\n`. Sí, no es un error tipográfico. A pesar de que aquí vemos dos caracteres, desde el punto de vista de PHP es un solo carácter:

  ```php
  <?php

  print_r("- Are you hungry?\n- Aaaarrrgh!");
  ```

  El resultado será así:

  ```text
  - Are you hungry?
  - Aaaarrrgh!
  ```

  ## ¿Qué es `\n`?

  `\n` es una secuencia de escape (en inglés escape sequence, a veces se dice "secuencia escapada"). Denota un salto de línea, pero no se muestra directamente. No verás `\n` en la salida del programa, ya que solo influye en la disposición del texto.

  En los editores de texto, al presionar Enter se añade el carácter invisible LF (Line Feed). Eso es justamente lo que significa `\n`. A veces se pueden ver estos caracteres si se activa la visualización de caracteres especiales:

  ```text
  - Привет!¶
  - О, привет!¶
  - Как дела?
  ```

  Las impresoras, los editores y el intérprete de PHP entienden `\n` como una orden de empezar el texto en una nueva línea.

  Una particularidad importante de PHP: las secuencias de escape como `\n` solo funcionan dentro de comillas dobles. En comillas simples, `\n` son simplemente dos caracteres ordinarios, `\` y `n`:

  ```php
  <?php

  print_r("Hello\nWorld");
  // Hello
  // World

  print_r('Hello\nWorld');
  // => Hello\nWorld
  ```

  ## Ejemplos de uso de `\n`

  Así es como PHP procesa la secuencia de escape `\n`:

  ```text
  En el código  "Hello\nWorld"
                     ↓
  En pantalla   Hello
                World
  ```

  La ubicación de `\n` cambia la salida final:

  ```php
  <?php

  print_r("Hello\nWorld");
  // Hello
  // World

  print_r("Hello \nWorld");
  // Hello
  // World  (al final de la primera línea hay un espacio)

  print_r("Hello\n World");
  // Hello
  //  World  (en la segunda línea hay un espacio al inicio)

  print_r("Hello\n\nWorld");
  // Hello
  //
  // World  (una línea vacía entre ellas)
  ```

  Los espacios antes o después de `\n` también se tienen en cuenta. PHP los percibe como caracteres ordinarios y los muestra en la salida.

  También puedes insertar `\n` en cualquier parte de la cadena — antes, después o incluso usarlo por separado:

  ```php
  <?php

  print_r("First line\n");
  print_r("\n"); // Simplemente una línea vacía
  print_r("Second line");
  ```

  El resultado será así:

  ```text
  First line

  Second line
  ```

  ## Cómo imprimir el propio carácter `\n`

  `\n` en PHP es una secuencia de escape. Controla la disposición del texto y no se muestra en la pantalla como caracteres ordinarios. Si necesitas mostrar precisamente los caracteres `\` y `n`, y no un salto de línea, hay que escaparlos. Para esto, se añade otra barra antes de la barra invertida:

  ```php
  <?php

  print_r("Hello\\nWorld");
  // => Hello\nWorld

  // Si olvidas indicar la segunda barra
  print_r("Hello\nWorld");
  // Hello
  // World
  ```

  En este caso, PHP entiende `\\` como una barra invertida ordinaria y muestra la cadena sin salto de línea.

  ## Otras secuencias de escape

  Además de `\n`, en PHP hay otras secuencias de escape:

  - `\t` denota una tabulación (el equivalente de la tecla Tab)
  - `\r` denota un retorno de carro (se usa en Windows, pero rara vez se aplica en código PHP)
  - En programación, lo más habitual es usar precisamente `\n`, basta para la mayoría de las tareas

  ## Detalles importantes

  - `\n` es un solo carácter, a pesar de que en el código se escribe como dos (`\` y `n`)
  - Las secuencias de escape en PHP solo funcionan dentro de comillas dobles
  - En Windows se usa por defecto la combinación `\r\n`, pero en el desarrollo multiplataforma se acostumbra usar solo `\n` para evitar problemas al trasladar el código entre sistemas. Por eso conviene configurar tu editor para usar `\n`
instructions: |
  Estás escribiendo un programa que le muestra al usuario una pista sobre cómo dividir el texto en líneas. Muestra la pista con una sola llamada a `print_r()`:

  ```text
  Для разделения строк используйте "\n"
  Пример: print_r("строка1\nстрока2")
  ```

  Ten en cuenta: el `\n` de la primera línea es texto literal, no un salto de línea.
