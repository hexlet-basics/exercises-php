---

name: Codificación
theory: |
  En el nivel más básico, la computadora trabaja solo con ceros y unos, lo que constituye el llamado código binario. Cada uno o cero se denomina bit (de binary digit, "dígito binario").

  Cualquier dato en la computadora se representa simplemente como una secuencia de bits, por ejemplo imágenes, música y texto. Los números habituales del sistema decimal también se pueden representar en forma binaria.

  - 0 → `0`
  - 1 → `1`
  - 2 → `10`

  ## ¿Cómo codificar el texto?

  La computadora no "entiende" el texto. Para trabajar con letras y otros caracteres, también hay que convertirlos en números. Esto se hace mediante codificaciones, es decir, tablas en las que a cada carácter le corresponde un número determinado.

  La forma más sencilla consiste en numerar las letras, empezando por el 1.

  - `a` → `1`
  - `b` → `2`
  - ...y así hasta `z` → `26`

  Ahora podemos representar la palabra hello como un conjunto de números.

  ```text
  h e l l o
  ↓ ↓ ↓ ↓ ↓
  8 5 12 12 15
  ```

  Y *good* se convierte en esta secuencia.

  ```text
  g o o d
  ↓ ↓ ↓ ↓
  7 15 15 4
  ```

  El programa no sabe que esto es una palabra. Simplemente ve la instrucción "hay que mostrar el carácter con código 8, luego el de código 5, etc.".

  ## ASCII. La primera codificación masiva

  Las primeras computadoras trabajaban principalmente con el inglés. Para él, en los años 60 se ideó la tabla ASCII, que incluía 128 caracteres, entre ellos el alfabeto latino, los dígitos, los signos de puntuación, los caracteres especiales (@, #, !, \n) y los códigos de control.

  Esto bastaba para los primeros programas, pero no para todo el mundo.

  Cuando las computadoras empezaron a usarse en otros países, surgió un problema. En ASCII no hay cirílico, ni jeroglíficos, ni escritura árabe, ni acentos, ni símbolos de moneda, etc.

  Cada país o empresa empezó a hacer su propia codificación basada en ASCII.

  - Windows ideó Windows-1251 para el ruso
  - Apple creó Mac Roman
  - Los países de Europa del Este, Asia y Oriente Medio desarrollaron sus propias variantes

  Todas estas codificaciones eran incompatibles entre sí. El código 226 en una codificación podía ser la letra é, en otra la letra и, y en una tercera un carácter técnico cualquiera. Esto provocaba un verdadero caos.

  ## Cómo se veían los problemas con las codificaciones

  Si ves esto en un texto.

  ```text
  ÐÑÐ¸Ð²ÐµÑ!
  ```

  Significa que el programa determinó incorrectamente la codificación del texto. Recibió una secuencia de bytes, pero los leyó con la tabla equivocada.

  Esto era lo normal en los años 90 y 2000. Un programa escribía el texto en Windows-1251, otro lo leía como ISO-8859-1, y el resultado era basura.

  ## Unicode y UTF-8. El fin del desorden

  Para arreglar todo, en los años 90 se empezó a crear la tabla universal Unicode, que contiene los caracteres de todos los sistemas de escritura del mundo, entre ellos el alfabeto latino y el cirílico, la escritura china y árabe, los signos matemáticos, la escritura del antiguo Egipto e incluso los emojis.

  Dentro de Unicode hay varios formatos de almacenamiento. El más extendido de ellos es UTF-8. Codifica de forma compacta los caracteres del inglés, pero puede ampliarse para cualquier otro.

  Hoy en día UTF-8 es el estándar por defecto en internet, Linux, las bases de datos y los editores de código. El código fuente de PHP y las cadenas en los proyectos modernos también se acostumbran a almacenar en UTF-8.

  ## ¿Para qué necesita saber esto un programador?

  - Trabajarás con texto, y los errores de codificación siguen ocurriendo, especialmente al leer archivos, procesar datos e interactuar con APIs y bases de datos.
  - PHP almacena la cadena como una secuencia de bytes, por lo que, al trabajar con archivos y bases de datos, a veces hay que indicar la codificación explícitamente.
  - Hay que saber diagnosticar los problemas. Por ejemplo, si ves "caracteres ilegibles", casi con seguridad es un error de codificación.
instructions: |
  El programa recibe los códigos numéricos de los caracteres y los muestra en la pantalla — esto resulta cómodo cuando un carácter es difícil de teclear con el teclado. Encuentra los caracteres con los códigos 126, 94 y 37 en la [tabla ASCII](https://www.ascii-code.com) (nos interesa el código decimal — *dec* o *decimal*) y muestra cada uno en una línea aparte usando la función `chr()` y un salto de línea:

  ```php
  print_r(chr(...) . "\n");
  print_r(chr(...) . "\n");
  print_r(chr(...) . "\n");
  ```

  Por ejemplo, el carácter `?` tiene el código 63:

  ```php
  print_r(chr(63)); // salida: ?
  ```
