name: Módulos
theory: |
  A medida que un programa crece, el código se divide en archivos separados. En PHP, un archivo se conecta con la instrucción `require` — después de eso, todas sus funciones quedan disponibles:

  ```php
  <?php
  // Solution.php

  require 'helpers.php';

  sayHi(); // => Hi!
  ```

  Las pruebas de este curso usan el mismo mecanismo: cargan tu solución con `require 'Solution.php';`.

  `include` se diferencia de `require` en cómo se gestiona un archivo inexistente: `include` emite una advertencia y el programa continúa, mientras que `require` se detiene con un error. `require_once` carga un archivo solo una vez, lo cual es importante para archivos con funciones: volver a declarar una función provoca un error.

  A diferencia de muchos lenguajes, las funciones integradas de PHP están disponibles en todas partes sin necesidad de importar nada. Por ejemplo, `floor()` redondea un número hacia abajo y `ceil()` hacia arriba:

  ```php
  <?php

  print_r(floor(7.9)); // => 7
  print_r(ceil(7.1));  // => 8
  ```

  Para evitar conflictos de nombres, PHP tiene **espacios de nombres** — has visto la línea `namespace HexletBasics\...;` al principio de cada ejercicio. Se estudian en detalle más adelante, en Hexlet.

instructions: |
  Implementa la función `amountPerPerson()`. Recibe el total de la cuenta de un restaurante, el número de personas y el porcentaje de propina, y devuelve la cantidad que paga cada persona. El resultado se redondea hacia arriba — nadie debe pagar de menos.

  Usa la función integrada `ceil()` para redondear. Está disponible de inmediato — no hay que cargar nada.

  ```php
  <?php

  // Cuenta 300, 4 personas, propina del 20% — 360 en total, cada uno paga 90
  print_r(amountPerPerson(300, 4, 20)); // => 90

  // Cuenta 350, 3 personas, propina del 10% — 385 en total, cada uno paga 129
  print_r(amountPerPerson(350, 3, 10)); // => 129
  ```

  ## Pista

  * Primero calcula el total con la propina, luego divídelo entre el número de personas y redondea hacia arriba
  * `ceil()` devuelve un `float`, mientras que la función debe devolver un `int` — la conversión de tipos te ayudará

