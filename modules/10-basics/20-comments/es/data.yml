---
name: Comentarios
tips:
  - >
    [Más sobre los
    comentarios](https://www.w3schools.com/php/php_comments.asp)
definitions:
  - name: Comentario
    description: >
      texto en el código del programa que no afecta la funcionalidad y se
      agrega por los programadores para ellos mismos y sus colegas.


      `// comentario de una línea`


      ```

      /*

      * comentario de varias líneas

      * comentario de varias líneas

      */

      ```
