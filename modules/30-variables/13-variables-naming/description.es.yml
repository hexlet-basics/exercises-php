---

name: Elección del nombre de la variable
theory: |
  Imagina que tenemos el siguiente programa:

  ```php
  <?php

  $x = '¡Padre!';
  print_r($x);
  ```

  Desde el punto de vista técnico, todo funciona. Ya hemos visto ejemplos similares, pero aquí se usa una variable con el nombre `$x`. Los nombres malos dificultan leer y entender el código. Aquí tienes algunos ejemplos de variables mal elegidas:

  ```php
  <?php

  $a = "John";
  $n = 42;
  $ddr = "New York";
  ```

  ¿Qué son estas variables? ¿Qué se almacena en ellas? Para entenderlo, hay que leer todo el resto del código y adivinar por el contexto.

  ![Nomenclatura](./assets/naming.png)

  Al ordenador no le importa cómo se llama una variable. Para él, `$x`, `$abc`, `$message` o `$elephantInTheRoom` son simplemente etiquetas para almacenar datos. A las personas les importa otra cosa. Los programadores leen código mucho más a menudo de lo que lo escriben. Por eso los nombres de las variables son una parte importante de la comunicación a través del código.

  ## Buenos ejemplos

  ```php
  <?php

  $userName = "Arya Stark";
  $unpaidOrdersCount = 3;
  $maxAttempts = 5;
  ```

  Un buen nombre de variable ayuda a entender qué hace el programa sin tener que leer detenidamente cada línea.
  Es especialmente importante dar nombres cuyo significado se entienda sin contexto, sin necesidad de leer todo el código que los rodea.

  Aquí tienes algunos consejos:

  - Usa el inglés. Es el estándar internacional. Es mejor escribir `$ordersCount` en lugar de `$kolvoZakazov`. Si el inglés todavía te resulta difícil, usa un traductor, no pasa nada. Con el tiempo será más fácil.
  - Procura que el nombre refleje el significado de la variable. Que sea un poco más largo, pero comprensible.
  - No tengas miedo de dedicar tiempo a elegir un buen nombre. Es una inversión en la legibilidad y el mantenimiento del código.

  Entre los programadores incluso hay un chiste: "Algunas de las tareas más difíciles en la programación son el almacenamiento en caché y la elección de nombres para las variables." A veces, inventar un nombre adecuado realmente es difícil. Aquí tienes un ejemplo: ¿cómo llamarías a una variable que almacena la cantidad de pedidos impagados de clientes con deudas del trimestre anterior?

  Y ahora un pequeño ejercicio: Inventa un nombre para una variable que almacene la "cantidad de hermanos y hermanas del rey". Escríbelo en un bloc de notas o envíatelo por correo electrónico. Solo el nombre, sin explicaciones. Volveremos a esta tarea en unas lecciones.
instructions: |
  Crea una variable que describa la cantidad de mis hermanos y asígnele el valor *2*. Imprime el contenido de la variable. Luego, compara tu nombre con el nombre utilizado en la solución del profesor.
