---

name: Números de punto flotante
theory: |
  En matemáticas hay diferentes tipos de números. Por ejemplo:

  - Naturales: números enteros positivos: 1, 2, 3, etc.
  - Racionales: números fraccionarios que se pueden representar como una división, por ejemplo: 0.5, 1.75, 3.14.

  Desde el punto de vista de las matemáticas, todo es simple. Pero desde el punto de vista de la computadora, entre estos tipos de números hay un verdadero abismo. Intenta resolver mentalmente: ¿cuánto es `0.2` + `0.1`? Obviamente, `0.3`. PHP mostrará lo mismo al imprimir:

  ```php
  <?php

  print_r(0.1 + 0.2); // => 0.3
  ```

  Todo parece estar bien. Pero hagamos una comprobación: restemos 0.3 de esta suma. Matemáticamente, el resultado debería ser exactamente cero. Esto es lo que dice PHP:

  ```php
  <?php

  print_r(0.1 + 0.2 - 0.3); // => 5.5511151231258E-17
  ```

  En lugar de cero obtenemos una pequeña «cola»: un número en notación exponencial, aproximadamente igual a 0.000000000000000055. La cuestión es que internamente PHP no almacena exactamente 0.3, sino una aproximación de 0.30000000000000004. Al imprimir, el número se redondea a 14 dígitos significativos, por lo que el error no es visible. Pero no desaparece de los cálculos.

  ## ¿Por qué sucede esto?

  Este comportamiento es típico de Python, JavaScript y la mayoría de los demás lenguajes de programación.

  La razón está en el funcionamiento de la computadora. Una computadora trabaja con memoria limitada, mientras que los números racionales son infinitamente precisos. Entre 0.1 y 0.2 se pueden colocar infinitos números. Pero la computadora no puede almacenar el infinito. Aproxima el número, tratando de ajustarlo a la cantidad de bits disponible.

  Estos valores aproximados se llaman números de punto flotante (floating point numbers). Su almacenamiento y los cálculos con ellos siguen reglas estrictas descritas en un estándar especial, IEEE 754, en el que se basan la mayoría de los lenguajes de programación.

  ## Cuándo aparecen estos números

  Los números de punto flotante aparecen en los programas con más frecuencia de lo que parece. Estos son los casos principales:

  - Cuando escribes explícitamente un número fraccionario, por ejemplo 0.1, 2.5, 3.14.
  - Cuando realizas una división con resultado fraccionario:

  ```php
  <?php

  print_r(1 / 2); // => 0.5
  print_r(2 / 3); // => 0.66666666666667
  ```

  Incluso si el resultado parece «bonito», internamente sigue representado como un valor aproximado. Algunas fracciones, como 1 / 3, no pueden representarse exactamente en el sistema binario, por lo que su precisión siempre es limitada.

  ## Dónde es crítico y cómo se trabaja con esto

  Normalmente, un pequeño error no molesta. Pero en cálculos financieros, tareas científicas y de ingeniería, así como en la comparación exacta de resultados, puede convertirse en un problema. En los programas reales, el dinero a menudo se almacena en unidades mínimas, por ejemplo en centavos, es decir, se usan números enteros en lugar de fraccionarios. En otros casos, el resultado se redondea a la cantidad necesaria de dígitos, los números se comparan con un margen de error aceptable o se usan tipos de datos y bibliotecas especiales para cálculos exactos.

  ## Qué hay que recordar

  Las operaciones con números de punto flotante no siempre son exactas, y esto es normal. PHP redondea los números al imprimir, por lo que el error no siempre es visible en la pantalla, pero está presente en los cálculos. La precisión se puede controlar, por ejemplo, mediante el redondeo o la comparación de números con un margen de error dado. Al trabajar con dinero, mediciones precisas o cálculos científicos, es mejor usar tipos de datos especiales que proporcionen control sobre la precisión.

instructions: |
  Estás pagando dos productos en una tienda en línea: el primero cuesta 0.1 rublos, el segundo — 0.2 rublos. El programa de caja debe verificar la precisión de los cálculos: restar los 0.3 rublos esperados del total.

  Calcula e imprime esta diferencia. Esperas ver cero, pero PHP mostrará algo interesante.

