---
name: Operaciones aritméticas
tips:
  - >
    Siempre separa los operadores aritméticos con espacios de los propios
    números (operandos) – esto es un buen estilo de programación. Por eso en
    nuestros ejemplos es `print_r(3 + 4)`, no `print_r(3+4)`.
  - >
    La división por cero resulta en un error `Division by zero`. Para evitarlo,
    debes conocer las estructuras condicionales (las aprenderás en las próximas
    lecciones).
  - |
    [División con resto](https://es.wikipedia.org/wiki/Divisi%C3%B3n_eucl%C3%ADdea)
  - >
    Si en el editor hay líneas `// BEGIN` y `// END`, el código debe escribirse
    entre esas líneas.
definitions:
  - name: Instrucción
    description: >
      la parte autónoma más pequeña de un lenguaje de programación; un comando o
      conjunto de comandos. Un programa suele ser una secuencia de
      instrucciones.
